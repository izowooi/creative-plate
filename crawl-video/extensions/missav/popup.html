<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body { width:280px;padding:12px;font-family:sans-serif;background:#1a1a1a;color:#fff;margin:0; }
    h3 { font-size:13px;margin:0 0 10px;color:#e50914; }
    select, button { width:100%;padding:8px;margin:4px 0;border-radius:4px;box-sizing:border-box; }
    select { background:#333;color:#fff;border:1px solid #555; }
    button { border:none;cursor:pointer;font-size:13px;font-weight:bold; }
    #dlBtn { background:#e50914;color:#fff; }
    #copyBtn { background:#333;color:#fff;border:1px solid #555; }
    #status { font-size:11px;color:#aaa;margin-top:6px;min-height:16px; }
    #noVideo { color:#aaa;font-size:12px; }
  </style>
</head>
<body>
  <h3>⬇ MissAV Downloader</h3>
  <div id="main" style="display:none">
    <select id="qualitySelect"></select>
    <button id="dlBtn">다운로드 (.ts 파일)</button>
    <button id="copyBtn">m3u8 URL 복사</button>
    <div id="status"></div>
  </div>
  <div id="noVideo">missav.ai 영상 페이지를 열어주세요.</div>
  <script src="popup.js"></script>
</body>
</html>
